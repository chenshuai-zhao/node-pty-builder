name: Build node-pty Linux prebuilds

# 为「京智办」编译 node-pty 的 Linux 原生模块(供 Electron 38 / ABI 137 使用)。
# 在 GitHub 的 Linux runner 上编译,产出 x64 + arm64 两套 {pty.node, spawn-helper}。
# 触发方式:推送到仓库即自动跑,或在 Actions 页面手动 Run workflow。

on:
  push:
    branches: [main, master]
  workflow_dispatch: # 允许在 GitHub 网页上手动触发

# 锁定版本(与「京智办」项目一致,勿改)
env:
  NODE_PTY_VERSION: '1.1.0'
  ELECTRON_VERSION: '38.7.0'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest        # x86_64
            arch_name: linux-x64
          - runner: ubuntu-24.04-arm     # ARM64(GitHub 提供的 ARM runner)
            arch_name: linux-arm64
    runs-on: ${{ matrix.runner }}
    name: Build ${{ matrix.arch_name }}
    steps:
      - name: Show environment
        run: |
          echo "Runner arch: $(uname -m)"
          echo "Target: ${{ matrix.arch_name }}"
          node -v || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install build toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3 make g++

      - name: Install node-pty source + prebuildify
        run: |
          mkdir -p build-work && cd build-work
          npm init -y
          npm install "node-pty@${NODE_PTY_VERSION}" prebuildify node-gyp --no-audit --no-fund

      - name: Compile node-pty for Electron (node-gyp, native layout)
        run: |
          cd build-work/node_modules/node-pty
          # 用 node-gyp 针对 Electron 38 (ABI 137) 编译，产出官方 JS 期望的
          # build/Release/pty.node + build/Release/spawn-helper。
          # --dist-url + --target 锁定 Electron 头文件；node-pty 是 N-API，跨 ABI 通用。
          npx node-gyp rebuild \
            --target=${ELECTRON_VERSION} \
            --arch=$(node -p "process.arch") \
            --dist-url=https://electronjs.org/headers

      - name: Collect artifacts (pty.node[, spawn-helper])
        run: |
          cd build-work/node_modules/node-pty
          OUT="$GITHUB_WORKSPACE/output/${{ matrix.arch_name }}"
          mkdir -p "$OUT"
          echo "=== build/Release 目录内容 ==="
          ls -la build/Release/ || true

          # pty.node —— Linux 必需且充分:pty.cc 中 spawn-helper 仅 __APPLE__ 分支使用,
          # Linux 走 forkpty,不需要 spawn-helper(binding.gyp 也只给 mac 定义该 target)。
          cp -v build/Release/pty.node "$OUT/"

          # spawn-helper:Linux 上不存在也不需要;若意外编出则一并带上,无害。
          HELPER=$(find . -name spawn-helper -type f 2>/dev/null | head -1)
          if [ -n "$HELPER" ]; then
            cp -v "$HELPER" "$OUT/spawn-helper"
            chmod +x "$OUT/spawn-helper"
            echo "(附带了 spawn-helper)"
          else
            echo "(Linux 无需 spawn-helper —— 符合预期)"
          fi

          echo "=== 验证产物 ==="
          ls -la "$OUT/"
          file "$OUT/pty.node"

      - name: Verify artifacts (ELF + 类型)
        run: |
          OUT="$GITHUB_WORKSPACE/output/${{ matrix.arch_name }}"
          # 这些二进制是针对 Electron 38 (ABI 137) 编的，CI 的 Node 运行时不一定能 require，
          # 故只校验文件类型/存在性；真正的运行验证在「京智办」打包产物里做。
          test -f "$OUT/pty.node" || { echo "缺 pty.node"; exit 1; }
          file "$OUT/pty.node" | grep -q "ELF" || { echo "pty.node 不是 ELF"; exit 1; }
          echo "✅ pty.node 就位且为 Linux ELF（Linux 不需要 spawn-helper）"

      - name: Upload prebuild artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-pty-${{ matrix.arch_name }}
          path: output/${{ matrix.arch_name }}/
          if-no-files-found: error
