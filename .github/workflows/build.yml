name: Build node-pty Linux prebuilds

# 为「京智办」编译 node-pty 的 Linux 原生模块(供 Electron 38 / ABI 137 使用)。
# 在 GitHub 的 Linux runner 上编译,产出 x64 + arm64 两套 {pty.node, spawn-helper}。
# 触发方式:推送到仓库即自动跑,或在 Actions 页面手动 Run workflow。

on:
  push:
    branches: [main, master]
  workflow_dispatch: # 允许在 GitHub 网页上手动触发

# 锁定版本(与「京智办」项目一致,勿改)
env:
  NODE_PTY_VERSION: '1.1.0'
  ELECTRON_VERSION: '38.7.0'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest        # x86_64
            arch_name: linux-x64
          - runner: ubuntu-24.04-arm     # ARM64(GitHub 提供的 ARM runner)
            arch_name: linux-arm64
    runs-on: ${{ matrix.runner }}
    name: Build ${{ matrix.arch_name }}
    steps:
      - name: Show environment
        run: |
          echo "Runner arch: $(uname -m)"
          echo "Target: ${{ matrix.arch_name }}"
          node -v || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install build toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3 make g++

      - name: Install node-pty source + prebuildify
        run: |
          mkdir -p build-work && cd build-work
          npm init -y
          npm install "node-pty@${NODE_PTY_VERSION}" prebuildify node-gyp --no-audit --no-fund

      - name: Compile prebuild for Electron (N-API)
        run: |
          cd build-work/node_modules/node-pty
          npx prebuildify --napi -t electron@${ELECTRON_VERSION} --strip

      - name: Collect artifacts (pty.node + spawn-helper)
        run: |
          cd build-work/node_modules/node-pty
          OUT="$GITHUB_WORKSPACE/output/${{ matrix.arch_name }}"
          mkdir -p "$OUT"
          echo "=== prebuilds 目录内容 ==="
          ls -la prebuilds/ || true
          ls -la prebuilds/${{ matrix.arch_name }}/ || true
          cp -v prebuilds/${{ matrix.arch_name }}/pty.node "$OUT/"
          # spawn-helper:Linux fork pty 必需
          if [ -f "prebuilds/${{ matrix.arch_name }}/spawn-helper" ]; then
            cp -v "prebuilds/${{ matrix.arch_name }}/spawn-helper" "$OUT/"
          else
            # 兜底:从 build 目录找
            find . -name spawn-helper -exec cp -v {} "$OUT/" \; || true
          fi
          chmod +x "$OUT/spawn-helper" || true
          echo "=== 验证产物 ==="
          ls -la "$OUT/"
          file "$OUT/pty.node"
          file "$OUT/spawn-helper" || true

      - name: Verify pty works
        run: |
          cd build-work
          node -e "
            const p = require('node-pty');
            const t = p.spawn('/bin/bash', ['-c', 'echo PTY_OK; pwd'], { cwd: process.env.HOME, env: process.env });
            let o = '';
            t.onData(d => o += d);
            t.onExit(({ exitCode }) => { console.log('OUTPUT:', o.trim(), 'EXIT:', exitCode); process.exit(0); });
            setTimeout(() => { console.error('TIMEOUT'); process.exit(1); }, 5000);
          "

      - name: Upload prebuild artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-pty-${{ matrix.arch_name }}
          path: output/${{ matrix.arch_name }}/
          if-no-files-found: error
